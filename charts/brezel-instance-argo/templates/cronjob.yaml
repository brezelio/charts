{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bakery-schedule
  namespace: {{ .Values.namespace }}
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  jobTemplate:
    metadata:
      name: brezel-cron
    spec:
      template:
        metadata:
          labels:
            app: brezel-cron
            configVersion: {{ include "brezel.configVersion" . }}
        spec:
          initContainers:
          - name: prepare-storage-container
            image: busybox
            command:
            - /bin/sh
            - -c
            args:
            - |
{{ include "brezel.prepareStorageScript" . | indent 14 }}
            securityContext:
              runAsUser: 0
            volumeMounts:
            - name: brezel-storage
              mountPath: /app/storage
            envFrom:
            - configMapRef:
                name: brezel-api
            - secretRef:
                name: {{ include "brezel.runtimeSecretName" . }}
            resources:
              limits:
                cpu: {{ .Values.brezel_init_container_resources.limits.cpu }}
                memory: {{ .Values.brezel_init_container_resources.limits.memory }}
              requests:
                cpu: {{ .Values.brezel_init_container_resources.requests.cpu }}
                memory: {{ .Values.brezel_init_container_resources.requests.memory }}
          - name: wait-for
            image: ghcr.io/patrickdappollonio/wait-for:latest
            command:
            - /wait-for
            args:
            - --host="{{ if .Values.with_database_pod }}{{ include "brezel.mysqlServiceName" . }}{{ else }}{{ .Values.db_host }}{{ end }}:{{ if .Values.with_database_pod }}3306{{ else }}{{ .Values.db_port }}{{ end }}"
            - --verbose
            resources:
              limits:
                cpu: {{ .Values.brezel_init_container_resources.limits.cpu }}
                memory: {{ .Values.brezel_init_container_resources.limits.memory }}
              requests:
                cpu: {{ .Values.brezel_init_container_resources.requests.cpu }}
                memory: {{ .Values.brezel_init_container_resources.requests.memory }}
          containers:
          - name: bakery-schedule
            image: {{ .Values.image }}
            command:
            - /bin/sh
            - -c
            - {{ .Values.cronjob.command | quote }}
            envFrom:
            - configMapRef:
                name: brezel-api
            - secretRef:
                name: {{ include "brezel.runtimeSecretName" . }}
            volumeMounts:
            - name: brezel-storage
              mountPath: /app/storage
          restartPolicy: OnFailure
          imagePullSecrets:
          - name: {{ include "brezel.imagePullSecretName" . }}
          volumes:
          - name: brezel-storage
            emptyDir: {}
{{- end }}
