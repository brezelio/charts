apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: brezel-spa
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: brezel-spa
  template:
    metadata:
      labels:
        app: brezel-spa
        configVersion: {{ include "brezel.spaConfigVersion" . }}
    spec:
      containers:
      - name: brezel-spa
        image: {{ .Values.spa_image }}
        imagePullPolicy: Always
        workingDir: /usr/share/nginx/html
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config-volume
          mountPath: /usr/share/nginx/html/config.js
          subPath: config.js
          readOnly: true
      imagePullSecrets:
      - name: {{ include "brezel.imagePullSecretName" . }}
      volumes:
      - name: config-volume
        configMap:
          name: brezel-spa
  strategy:
    canary:
      stableService: brezel-spa
      canaryService: brezel-spa-canary
      trafficRouting:
        nginx:
          stableIngress: brezel-spa
      steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 40
      - pause: {duration: 10}
      - setWeight: 60
      - pause: {duration: 10}
      - setWeight: 80
      - pause: {duration: 10}
---
apiVersion: v1
kind: Service
metadata:
  name: brezel-spa-canary
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: brezel-spa
  ports:
  - port: 80
    targetPort: 80

