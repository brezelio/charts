{{- if .Values.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "brezel.bootstrapJobName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: brezel-bootstrap
    configVersion: {{ include "brezel.configVersion" . }}
spec:
  backoffLimit: {{ .Values.bootstrap.backoff_limit }}
  ttlSecondsAfterFinished: {{ .Values.bootstrap.ttl_seconds_after_finished }}
  template:
    metadata:
      labels:
        app: brezel-bootstrap
        configVersion: {{ include "brezel.configVersion" . }}
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: prepare-storage-container
        image: busybox
        command:
        - /bin/sh
        - -c
        args:
        - printenv | awk -F= 'BEGIN{OFS=FS} {if ($1 ~ /^[[:alpha:]_][[:alnum:]_]*$/) printf "%s=\"%s\"\n", $1, substr($0, index($0,$2))}' > /app/storage/.env
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: brezel-storage
          mountPath: /app/storage
        envFrom:
        - configMapRef:
            name: brezel-api
        - secretRef:
            name: {{ include "brezel.runtimeSecretName" . }}
        resources:
          limits:
            cpu: {{ .Values.brezel_init_container_resources.limits.cpu }}
            memory: {{ .Values.brezel_init_container_resources.limits.memory }}
          requests:
            cpu: {{ .Values.brezel_init_container_resources.requests.cpu }}
            memory: {{ .Values.brezel_init_container_resources.requests.memory }}
      - name: wait-for
        image: ghcr.io/patrickdappollonio/wait-for:latest
        command:
        - /wait-for
        args:
        - --host="{{ if .Values.with_database_pod }}{{ include "brezel.mysqlServiceName" . }}{{ else }}{{ .Values.db_host }}{{ end }}:{{ if .Values.with_database_pod }}3306{{ else }}{{ .Values.db_port }}{{ end }}"
        - --verbose
        resources:
          limits:
            cpu: {{ .Values.brezel_init_container_resources.limits.cpu }}
            memory: {{ .Values.brezel_init_container_resources.limits.memory }}
          requests:
            cpu: {{ .Values.brezel_init_container_resources.requests.cpu }}
            memory: {{ .Values.brezel_init_container_resources.requests.memory }}
      containers:
      - name: brezel-bootstrap
        image: {{ .Values.image }}
        imagePullPolicy: Always
        command:
        - /bin/sh
        - -c
        - {{ .Values.bootstrap.command | quote }}
        envFrom:
        - configMapRef:
            name: brezel-api
        - secretRef:
            name: {{ include "brezel.runtimeSecretName" . }}
        volumeMounts:
        - name: brezel-storage
          mountPath: /app/storage
        resources:
          limits:
            cpu: {{ .Values.brezel_init_container_resources.limits.cpu }}
            memory: {{ .Values.brezel_init_container_resources.limits.memory }}
          requests:
            cpu: {{ .Values.brezel_init_container_resources.requests.cpu }}
            memory: {{ .Values.brezel_init_container_resources.requests.memory }}
      imagePullSecrets:
      - name: {{ include "brezel.imagePullSecretName" . }}
      volumes:
      - name: brezel-storage
        emptyDir: {}
{{- end }}
